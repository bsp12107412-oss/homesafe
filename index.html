<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#16294B">
<title>홈세이프 스코어</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif; background:#F6F5F1; color:#16294B; min-height:100vh; }
  .header { background:#16294B; color:#fff; padding:18px 20px 16px; }
  .header .title { font-size:20px; font-weight:800; letter-spacing:-0.02em; }
  .header .badge { font-size:11px; color:#C9962E; font-weight:700; letter-spacing:0.12em; margin-left:8px; }
  .header .sub { font-size:12px; opacity:0.75; margin-top:3px; }
  .steps { display:flex; gap:6px; padding:14px 20px 4px; }
  .steps > div { flex:1; text-align:center; }
  .steps .bar { height:4px; border-radius:2px; background:#E0DCD2; margin-bottom:5px; }
  .steps .bar.on { background:#C9962E; }
  .steps span { font-size:11px; font-weight:500; color:#9CA3AF; }
  .steps span.on { font-weight:800; color:#16294B; }
  .wrap { padding:16px 20px; max-width:560px; margin:0 auto; }
  h2 { font-size:17px; font-weight:800; margin:6px 0 12px; }
  h3 { font-size:16px; font-weight:800; }
  .modegrid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:22px; }
  .modecard { text-align:left; padding:14px; border-radius:14px; cursor:pointer; border:1.5px solid #D8D4CA; background:#FBFAF7; }
  .modecard.on { border:2.5px solid #C9962E; background:#fff; box-shadow:0 3px 12px rgba(201,150,46,0.2); }
  .modecard .n { font-size:15px; font-weight:800; }
  .modecard .num { font-size:20px; font-weight:900; color:#9CA3AF; margin:2px 0; }
  .modecard.on .num { color:#C9962E; }
  .modecard .d { font-size:11.5px; color:#6B7280; line-height:1.5; }
  .modecard .t { font-size:11px; color:#9CA3AF; margin-top:4px; }
  label.lbl { font-size:12px; font-weight:700; color:#6B7280; letter-spacing:0.08em; margin-bottom:6px; display:block; }
  input.field { width:100%; padding:12px 14px; font-size:16px; border-radius:10px; border:1.5px solid #D8D4CA; background:#fff; color:#16294B; outline:none; }
  .row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
  .btnrow { display:flex; gap:8px; }
  .btnrow button { flex:1; padding:11px 0; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; border:1.5px solid #D8D4CA; background:#fff; color:#6B7280; }
  .btnrow button.on { border:2px solid #16294B; background:#16294B; color:#fff; }
  .cta { width:100%; padding:16px 0; border-radius:12px; border:none; background:#C9962E; color:#fff; font-size:16px; font-weight:800; cursor:pointer; box-shadow:0 3px 10px rgba(201,150,46,0.35); margin-top:12px; }
  .cta:disabled { background:#D8D4CA; box-shadow:none; cursor:not-allowed; }
  .note { font-size:11.5px; color:#9CA3AF; margin-top:14px; line-height:1.6; }
  .modetag { display:inline-block; padding:5px 14px; border-radius:999px; font-size:12px; font-weight:800; margin-bottom:14px; }
  .domhead { display:flex; justify-content:space-between; align-items:center; margin:18px 0 10px; }
  .domhead .cnt { font-size:12px; font-weight:700; color:#9CA3AF; }
  .domhead .cnt.done { color:#2E7D5B; }
  .crit { font-size:10px; font-weight:800; color:#B3362E; margin-left:6px; vertical-align:middle; }
  .item { background:#fff; border-radius:12px; padding:12px 14px; margin-bottom:8px; border:1.5px solid #EAE7DE; }
  .item.urgent { border-color:#E5B5B0; }
  .item .q { font-size:14px; font-weight:600; margin-bottom:9px; line-height:1.45; }
  .choices { display:flex; gap:6px; }
  .choices button { flex:1; padding:9px 0; border-radius:8px; font-size:13px; font-weight:800; cursor:pointer; border:1.5px solid #E5E1D6; transition:all .12s; }
  .c2 { background:#E7F2ED; color:#2E7D5B; } .c2.on { background:#2E7D5B; color:#fff; border:2px solid #2E7D5B; }
  .c1 { background:#FBF0DF; color:#C77D1F; } .c1.on { background:#C77D1F; color:#fff; border:2px solid #C77D1F; }
  .c0 { background:#F9E7E5; color:#B3362E; } .c0.on { background:#B3362E; color:#fff; border:2px solid #B3362E; }
  .witem { background:#FFFDF7; }
  .wsec { border-top:2px solid #C9962E; padding-top:16px; margin-top:26px; }
  .wsec h3 { color:#8A6A1E; }
  .wsec p { font-size:12px; color:#6B7280; margin:4px 0 14px; line-height:1.6; }
  .gauge { position:fixed; bottom:0; left:0; right:0; background:#16294B; padding:12px 20px 16px; box-shadow:0 -4px 16px rgba(22,41,75,0.25); }
  .gauge .inner { max-width:560px; margin:0 auto; }
  .gauge .top { display:flex; justify-content:space-between; align-items:baseline; color:#fff; margin-bottom:6px; }
  .gauge .lab { font-size:12px; font-weight:700; opacity:0.75; }
  .gauge .sc { font-size:26px; font-weight:900; font-variant-numeric:tabular-nums; color:#C9962E; }
  .gauge .sc.warn { color:#F0A9A2; }
  .gauge .sc small { font-size:13px; font-weight:600; opacity:0.6; }
  .gauge .track { height:6px; border-radius:3px; background:rgba(255,255,255,0.15); }
  .gauge .fill { height:6px; border-radius:3px; background:#C9962E; transition:width .25s; }
  .gauge .alert { font-size:11.5px; color:#F0A9A2; font-weight:700; margin-top:6px; }
  .scorecard { background:#16294B; border-radius:16px; padding:26px 20px; text-align:center; color:#fff; margin-bottom:16px; }
  .scorecard .lab { font-size:12px; letter-spacing:0.15em; opacity:0.7; font-weight:700; }
  .scorecard .big { font-size:64px; font-weight:900; line-height:1.1; font-variant-numeric:tabular-nums; }
  .scorecard .big small { font-size:22px; font-weight:600; opacity:0.6; }
  .scorecard .grade { display:inline-block; margin-top:10px; padding:7px 22px; border-radius:999px; font-size:16px; font-weight:800; }
  .scorecard .desc { font-size:13px; margin-top:12px; opacity:0.85; line-height:1.6; }
  .scorecard .meta { font-size:11.5px; margin-top:10px; opacity:0.55; }
  .card { background:#fff; border-radius:14px; padding:16px; margin-bottom:14px; border:1.5px solid #EAE7DE; }
  .card h3 { font-size:15px; margin-bottom:12px; }
  .dbar { margin-bottom:12px; }
  .dbar .r { display:flex; justify-content:space-between; font-size:13px; font-weight:700; margin-bottom:4px; }
  .dbar .track { height:8px; border-radius:4px; background:#EFEDE6; }
  .dbar .fill { height:8px; border-radius:4px; transition:width .5s; }
  .panel { border-radius:14px; padding:16px; margin-bottom:14px; }
  .panel h3 { font-size:15px; margin-bottom:10px; }
  .panel .li { font-size:13.5px; padding:7px 0; line-height:1.5; border-bottom:1px solid rgba(0,0,0,0.06); }
  .panel .li:last-of-type { border-bottom:none; }
  .panel .foot { font-size:12px; margin-top:10px; font-weight:700; }
  .p-red { background:#F9E7E5; border:1.5px solid #E5B5B0; } .p-red h3,.p-red b,.p-red .foot { color:#B3362E; }
  .p-amb { background:#FBF0DF; border:1.5px solid #E8CFA4; } .p-amb h3,.p-amb b,.p-amb .foot { color:#9A6316; }
  .p-grn { background:#E7F2ED; border:1.5px solid #EAE7DE; } .p-grn h3 { color:#2E7D5B; }
  .p-red2 { background:#F9E7E5; border:2px solid #B3362E; } .p-red2 h3,.p-red2 .foot { color:#B3362E; }
  .resetbtn { width:100%; padding:15px 0; border-radius:12px; border:2px solid #16294B; background:#fff; color:#16294B; font-size:15px; font-weight:800; cursor:pointer; margin-bottom:30px; }
</style>
</head>
<body>
<div class="header">
  <div><span class="title">홈세이프 스코어</span><span class="badge">PROTOTYPE v0.2</span></div>
  <div class="sub">취약가구 주거위험 통합진단 · 진단자: 박성수 (자격 7종 · 사회복지사 2급)</div>
</div>
<div class="steps" id="steps"></div>
<div class="wrap" id="app"></div>
<div id="gauge"></div>

<script>
// ─── 데이터 ───
const DOMAINS = [
 { id:"elec", name:"전기 안전", icon:"⚡", items:[
  {t:"멀티탭 과부하·문어발식 사용 여부", core:1},
  {t:"전선 노출·손상·꺾임 상태", core:1},
  {t:"콘센트 주변 먼지·수분 방치 여부", core:1},
  {t:"누전차단기 작동 여부 (시험버튼 확인)", core:1},
  {t:"전기장판·전열기 안전사용 여부 (온도조절기 포함)", core:1},
  {t:"분전반(두꺼비집) 노후·용량 초과 여부"},
  {t:"조명기구 고정 상태 및 파손 여부"},
  {t:"욕실·주방 콘센트 방수·접지 상태"},
  {t:"콘센트·플러그 변색(트래킹 흔적) 여부"},
  {t:"연장선의 문틈·통행로 통과 여부 (눌림·걸림)"} ]},
 { id:"gas", name:"가스 안전", icon:"🔥", critical:1, items:[
  {t:"가스 중간밸브·콕크 정상 작동 여부", core:1},
  {t:"가스호스 노후·균열·구부러짐 상태", core:1},
  {t:"가스레인지 주변 인화물질 방치 여부", core:1},
  {t:"환기 상태 (주방 환기창·환풍기)", core:1},
  {t:"가스 자동차단장치·경보기 설치 여부", core:1},
  {t:"연소기 불꽃 색상 (적황색 = 불완전연소 의심)"},
  {t:"보일러 배기통 연결·이탈·막힘 (CO 중독 위험)"},
  {t:"LPG 용기 보관 위치·직사광선·전도 방지"} ]},
 { id:"fire", name:"소방 안전", icon:"🧯", critical:1, items:[
  {t:"단독경보형 감지기 설치 및 작동 여부", core:1},
  {t:"소화기 비치·사용기한·압력게이지 확인", core:1},
  {t:"피난 동선 확보 (현관·비상구 장애물)", core:1},
  {t:"전선·가연성 물질 주변 화기 방치 여부", core:1},
  {t:"난방기구 안전거리 (침구·커튼과 1m 이상)", core:1},
  {t:"침구·소파 주변 흡연 흔적 여부"},
  {t:"촛불·향 등 실내 화기 사용 습관"},
  {t:"화재 시 대피 요령 인지 여부 (구두 확인)"} ]},
 { id:"mech", name:"기계설비·보일러", icon:"🔧", items:[
  {t:"보일러 작동 상태·이상 소음·에러코드 이력"},
  {t:"난방·급수 배관 누수 흔적 (이음부·바닥 얼룩)"},
  {t:"동파 위험 개소 (노출 배관 보온 상태)"},
  {t:"온수 최고 온도 설정 (화상 위험, 50℃ 이하 권장)"},
  {t:"욕실·주방 배수 상태 (역류·악취·막힘)"},
  {t:"결로·곰팡이 발생 부위 (단열 불량 진단)"},
  {t:"환기 설비(자연 환기 포함) 확보 상태"} ]},
 { id:"fall", name:"낙상 예방", icon:"🦯", items:[
  {t:"욕실·화장실 미끄럼 방지 매트·바닥재 상태", core:1},
  {t:"욕실·계단 안전손잡이 설치 여부", core:1},
  {t:"실내 조명 밝기 (야간 이동 동선 포함)", core:1},
  {t:"문턱·바닥 단차·걸림 요소", core:1},
  {t:"침대 높이·이동 동선 안전성", core:1},
  {t:"계단 상태 (파손·미끄럼·난간)"},
  {t:"바닥 통행로의 전선·물건·이불 정리 상태"},
  {t:"실내화·슬리퍼 미끄럼 방지 상태"},
  {t:"높은 곳 물건 꺼낼 때 의자·발판 사용 습관"},
  {t:"야간 센서등·머리맡 조명 유무"} ]},
 { id:"env", name:"주거환경·위생", icon:"🏠", items:[
  {t:"채광·일조 상태"},
  {t:"실내 습도·곰팡이 냄새"},
  {t:"해충(바퀴·쥐 등) 흔적"},
  {t:"쓰레기·폐품 과다 적치 (저장강박 의심 포함)"},
  {t:"냉난방 적정성 (폭염·한파 대비 작동 여부)"},
  {t:"창문·방충망 개폐 및 파손 상태"},
  {t:"화장실·주방 위생 상태"} ]}
];
const WELFARE = [
 { id:"life", name:"생활·응급 대비", icon:"📞", items:[
  "응급 연락망 게시 여부 (보호자·이웃 연락처)",
  "복용약 관리 상태 (유효기한 경과·중복 복용)",
  "휴대폰 사용 가능 여부 (충전·조작)",
  "응급안전안심서비스(응급벨) 설치 여부",
  "냉장고 내 식품 상태 (부패 식품·식수 확보)",
  "최근 1주일 내 외부인 왕래 여부 (구두 확인)" ]},
 { id:"obs", name:"신체·심리 관찰", icon:"🤝", items:[
  "거동 상태 (보행 보조기구 필요성)",
  "대화 중 인지 상태 (질문 반복·날짜 혼동)",
  "영양 상태 외견 (급격한 체중 변화 등)",
  "우울·고립 징후 (표정·발언·집안 방치)",
  "돌봄·요양 서비스 이용 여부 및 미이용 사유",
  "주거 개선 지원사업 신청 이력·희망 여부" ]}
];
const CHOICES = [ {s:2,l:"양호",cls:"c2"}, {s:1,l:"주의",cls:"c1"}, {s:0,l:"즉시조치",cls:"c0"} ];

// ─── 상태 ───
let state = { step:0, mode:"quick", info:{initials:"",age:"",living:"독거",house:"단독주택"}, ans:{}, wel:{} };

function activeDomains(){ return DOMAINS.map(d=>({...d, items: state.mode==="quick" ? d.items.filter(i=>i.core) : d.items})).filter(d=>d.items.length); }
function totalItems(){ return activeDomains().reduce((a,d)=>a+d.items.length,0); }
function totalWelfare(){ return state.mode==="full" ? WELFARE.reduce((a,g)=>a+g.items.length,0) : 0; }
function score100(){ const n=Object.keys(state.ans).length; if(!n) return 0; const raw=Object.values(state.ans).reduce((a,b)=>a+b,0); return Math.round(raw/(totalItems()*2)*100); }
function urgentList(){ const l=[]; activeDomains().forEach(d=>d.items.forEach((it,i)=>{ if(state.ans[d.id+"-"+i]===0) l.push({domain:d.name,item:it.t,critical:!!d.critical}); })); return l; }
function cautionList(){ const l=[]; activeDomains().forEach(d=>d.items.forEach((it,i)=>{ if(state.ans[d.id+"-"+i]===1) l.push({domain:d.name,item:it.t}); })); return l; }
function welfareFlags(){ const l=[]; WELFARE.forEach(g=>g.items.forEach((it,i)=>{ if(state.wel[g.id+"-"+i]===true) l.push({group:g.name,item:it}); })); return l; }
function gradeOf(){
  const s=score100(), u=urgentList(), crit=u.some(x=>x.critical);
  let g;
  if(s>=90) g={name:"안심",color:"#2E7D5B",desc:"현재 주거환경이 안전하게 관리되고 있습니다."};
  else if(s>=70) g={name:"관심",color:"#5B7DA8",desc:"일부 항목의 개선을 권고합니다. 정기 재점검 대상입니다."};
  else if(s>=50) g={name:"주의",color:"#C77D1F",desc:"위험요소가 다수 발견되었습니다. 우선순위 개선이 필요합니다."};
  else g={name:"위험",color:"#B3362E",desc:"즉각적인 개선 조치와 집중관리가 필요한 가구입니다."};
  if((u.length>=3||crit)&&g.name!=="위험") g={name:"위험",color:"#B3362E",desc:crit?"가스·소방 분야에서 '즉시조치' 항목이 발견되어 '위험' 등급으로 상향되었습니다.":"'즉시조치' 항목 3건 이상 발견으로 '위험' 등급으로 상향되었습니다."};
  else if(u.length>0&&(g.name==="안심"||g.name==="관심")) g={name:"주의",color:"#C77D1F",desc:"총점과 무관하게 '즉시조치' 항목이 발견되어 등급이 상향 조정되었습니다."};
  return g;
}
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;"); }

// ─── 렌더 ───
function render(){
  renderSteps();
  const app=document.getElementById("app");
  if(state.step===0) app.innerHTML=viewStep0();
  else if(state.step===1) app.innerHTML=viewStep1();
  else app.innerHTML=viewStep2();
  renderGauge();
  bindEvents();
  document.body.style.paddingBottom = state.step===1 ? "116px" : "40px";
}
function renderSteps(){
  document.getElementById("steps").innerHTML = ["기본 정보","안전 진단","결과 리포트"].map((s,i)=>
    `<div><div class="bar ${i<=state.step?"on":""}"></div><span class="${i===state.step?"on":""}">${s}</span></div>`).join("");
}
function viewStep0(){
  const m=state.mode, inf=state.info;
  const modes=[{id:"quick",n:"간편 진단",num:"20문항",d:"재점검·해피콜용 핵심 항목",t:"약 20분"},{id:"full",n:"정밀 진단",num:"62문항",d:"신규 가구 최초 방문 · 복지관찰 포함",t:"약 45분"}];
  return `
  <h2>진단 모드 선택</h2>
  <div class="modegrid">${modes.map(x=>`
    <div class="modecard ${m===x.id?"on":""}" data-mode="${x.id}">
      <div class="n">${x.n}</div><div class="num">${x.num}</div><div class="d">${x.d}</div><div class="t">소요 ${x.t}</div>
    </div>`).join("")}
  </div>
  <h2>진단 대상자 기본 현황</h2>
  <div class="row2">
    <div><label class="lbl">성명 (이니셜)</label><input class="field" id="f-init" value="${esc(inf.initials)}" placeholder="예: K.O.S"></div>
    <div><label class="lbl">연령</label><input class="field" id="f-age" value="${esc(inf.age)}" placeholder="예: 78" inputmode="numeric"></div>
  </div>
  <div style="margin-bottom:12px"><label class="lbl">거주 형태</label>
    <div class="btnrow" data-group="living">${["독거","노인 2인","가족동거"].map(v=>`<button class="${inf.living===v?"on":""}" data-v="${v}">${v}</button>`).join("")}</div>
  </div>
  <div style="margin-bottom:12px"><label class="lbl">주거 형태</label>
    <div class="btnrow" data-group="house">${["단독주택","아파트","연립/다세대"].map(v=>`<button class="${inf.house===v?"on":""}" data-v="${v}">${v}</button>`).join("")}</div>
  </div>
  <button class="cta" id="start">${m==="quick"?"간편 진단 시작 (20문항) →":"정밀 진단 시작 (62문항) →"}</button>
  <p class="note">※ 본 진단은 생활 위험요인의 조기 발견·예방을 목적으로 하며 법정 정기검사를 대체하지 않습니다. 수집 정보는 개인정보 보호법에 따라 관리됩니다.<br>※ 본 프로토타입은 데이터를 저장·전송하지 않습니다. 화면을 닫으면 입력 내용이 사라집니다.</p>`;
}
function viewStep1(){
  const doms=activeDomains();
  let html = state.mode==="quick"
    ? `<div class="modetag" style="background:#E7EDF5;color:#3D5A80">간편 진단 모드 · 핵심 20문항</div>`
    : `<div class="modetag" style="background:#F5EDDA;color:#8A6A1E">정밀 진단 모드 · 안전 50문항 + 복지관찰 12문항</div>`;
  doms.forEach(d=>{
    const done=d.items.filter((_,i)=>state.ans[d.id+"-"+i]!==undefined).length;
    html+=`<div class="domhead"><h3>${d.icon} ${d.name}${d.critical?'<span class="crit">생명직결</span>':""}</h3><span class="cnt ${done===d.items.length?"done":""}">${done}/${d.items.length}</span></div>`;
    d.items.forEach((it,i)=>{
      const key=d.id+"-"+i, sel=state.ans[key];
      html+=`<div class="item ${sel===0?"urgent":""}"><div class="q">${esc(it.t)}</div><div class="choices">${
        CHOICES.map(c=>`<button class="${c.cls} ${sel===c.s?"on":""}" data-ans="${key}" data-s="${c.s}">${c.l}</button>`).join("")
      }</div></div>`;
    });
  });
  if(state.mode==="full"){
    html+=`<div class="wsec"><h3>복지·생활 관찰 (점수 미산정)</h3><p>안전점수와 별도로 기록되며, "관찰됨" 항목이 쌓이면 복지 연계가 자동 검토됩니다.</p></div>`;
    WELFARE.forEach(g=>{
      html+=`<div class="domhead"><h3 style="font-size:15px">${g.icon} ${g.name}</h3></div>`;
      g.items.forEach((it,i)=>{
        const key=g.id+"-"+i, sel=state.wel[key];
        html+=`<div class="item witem"><div class="q">${esc(it)}</div><div class="choices">
          <button class="c2 ${sel===false?"on":""}" data-wel="${key}" data-v="0">해당 없음</button>
          <button class="c1 ${sel===true?"on":""}" data-wel="${key}" data-v="1">관찰됨 (연계 검토)</button>
        </div></div>`;
      });
    });
  }
  const remain = totalItems()+totalWelfare()-Object.keys(state.ans).length-Object.keys(state.wel).length;
  html+=`<button class="cta" id="finish" ${remain>0?"disabled":""}>${remain>0?remain+"개 항목 남음":"결과 리포트 생성 →"}</button>`;
  return html;
}
function viewStep2(){
  const g=gradeOf(), s=score100(), inf=state.info, u=urgentList(), c=cautionList(), wf=welfareFlags();
  let html=`<div class="scorecard">
    <div class="lab">통합 안전점수 · ${state.mode==="quick"?"간편 진단":"정밀 진단"}</div>
    <div class="big">${s}<small> /100</small></div>
    <div class="grade" style="background:${g.color}">${g.name} 등급</div>
    <div class="desc">${g.desc}</div>
    <div class="meta">${inf.initials||"대상자"} · ${inf.age?inf.age+"세":"연령 미입력"} · ${inf.living} · ${inf.house}</div>
  </div>`;
  html+=`<div class="card"><h3>분야별 진단 결과</h3>${activeDomains().map(d=>{
    const vals=d.items.map((_,i)=>state.ans[d.id+"-"+i]).filter(v=>v!==undefined);
    const got=vals.reduce((a,b)=>a+b,0), max=d.items.length*2, pct=max?Math.round(got/max*100):0;
    const col=pct>=80?"#2E7D5B":pct>=50?"#C77D1F":"#B3362E";
    return `<div class="dbar"><div class="r"><span>${d.icon} ${d.name}</span><span style="color:${col}">${got} / ${max}점</span></div><div class="track"><div class="fill" style="width:${pct}%;background:${col}"></div></div></div>`;
  }).join("")}</div>`;
  if(u.length) html+=`<div class="panel p-red"><h3>🔧 현장 즉시조치 대상 (${u.length}건)</h3>${u.map(x=>`<div class="li"><b>[${x.domain}]</b> ${esc(x.item)}</div>`).join("")}<div class="foot">→ 방치 없이 당일 20분 내 현장 수선 원칙 적용</div></div>`;
  if(state.mode==="full"){
    const cls = wf.length>=3?"p-red2":wf.length>0?"p-amb":"p-grn";
    const head = wf.length>=3?"관할기관 즉시 인계":wf.length>0?"연계 검토 대상":"특이사항 없음";
    html+=`<div class="panel ${cls}"><h3>🤝 복지 연계 판정: ${head}</h3>${
      wf.length ? wf.map(x=>`<div class="li"><b>[${x.group}]</b> ${esc(x.item)}</div>`).join("") + `<div class="foot">${wf.length>=3?"→ 관찰 항목 3건 이상: 표준화 리포트로 관할 행정복지센터·복지관에 즉시 인계":"→ 관찰 항목 발견: 담당 복지기관과 연계 여부 협의"}</div>`
      : `<div style="font-size:13px;color:#2E7D5B">복지·생활 관찰 12개 항목에서 특이사항이 발견되지 않았습니다.</div>`
    }</div>`;
  }
  if(c.length) html+=`<div class="panel p-amb"><h3>📋 개선 권고 항목 (${c.length}건)</h3>${c.map(x=>`<div class="li"><b>[${x.domain}]</b> ${esc(x.item)}</div>`).join("")}</div>`;
  html+=`<div class="card"><h3>사후관리 자동 분류</h3><div style="font-size:13.5px;line-height:1.7;color:#4B5563">${
    g.name==="위험" ? "→ 1개월 내 재점검 · 관할 행정복지센터 연계 리포트 발송 대상"
    : g.name==="주의" ? "→ 3개월 내 전화 해피콜 · 6개월 내 방문 재점검 권장"
    : "→ 정기(연 1회) 점검 주기 편성 · 안전교육 이수 확인"}</div></div>`;
  html+=`<button class="resetbtn" id="reset">새 진단 시작</button>`;
  return html;
}
function renderGauge(){
  const g=document.getElementById("gauge");
  if(state.step!==1){ g.innerHTML=""; return; }
  const u=urgentList(), a=Object.keys(state.ans).length, w=Object.keys(state.wel).length;
  const tot=totalItems()+totalWelfare();
  g.innerHTML=`<div class="gauge"><div class="inner">
    <div class="top"><span class="lab">실시간 안전점수 · ${a}/${totalItems()}${state.mode==="full"?" · 복지관찰 "+w+"/"+totalWelfare():""}</span>
    <span class="sc ${u.length?"warn":""}">${score100()}<small>/100</small></span></div>
    <div class="track"><div class="fill" style="width:${(a+w)/tot*100}%"></div></div>
    ${u.length?`<div class="alert">⚠ 즉시조치 ${u.length}건 발견 — 등급 상향 규칙 적용됨</div>`:""}
  </div></div>`;
}
function bindEvents(){
  document.querySelectorAll("[data-mode]").forEach(el=>el.onclick=()=>{ if(state.mode!==el.dataset.mode){ state.mode=el.dataset.mode; state.ans={}; state.wel={}; } render(); });
  document.querySelectorAll("[data-group]").forEach(grp=>{
    grp.querySelectorAll("button").forEach(b=>b.onclick=()=>{ state.info[grp.dataset.group==="living"?"living":"house"]=b.dataset.v; render(); });
  });
  const fi=document.getElementById("f-init"); if(fi) fi.oninput=e=>state.info.initials=e.target.value;
  const fa=document.getElementById("f-age"); if(fa) fa.oninput=e=>state.info.age=e.target.value;
  const st=document.getElementById("start"); if(st) st.onclick=()=>{ state.step=1; render(); window.scrollTo(0,0); };
  document.querySelectorAll("[data-ans]").forEach(b=>b.onclick=()=>{ state.ans[b.dataset.ans]=parseInt(b.dataset.s); render(); });
  document.querySelectorAll("[data-wel]").forEach(b=>b.onclick=()=>{ state.wel[b.dataset.wel]=b.dataset.v==="1"; render(); });
  const fin=document.getElementById("finish"); if(fin) fin.onclick=()=>{ state.step=2; render(); window.scrollTo(0,0); };
  const rs=document.getElementById("reset"); if(rs) rs.onclick=()=>{ state={step:0,mode:state.mode,info:{initials:"",age:"",living:"독거",house:"단독주택"},ans:{},wel:{}}; render(); window.scrollTo(0,0); };
}
render();
</script>
</body>
</html>
