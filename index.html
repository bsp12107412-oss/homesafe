// ─── 저장소 (localStorage, 실패 시 메모리) ───
let memStore = [];
function loadRecords(){ try { return JSON.parse(localStorage.getItem("homesafe_records")||"[]"); } catch(e){ return memStore; } }
function saveRecords(arr){ try { localStorage.setItem("homesafe_records", JSON.stringify(arr)); } catch(e){ memStore = arr; toast("⚠ 저장 공간 부족 — 오래된 기록을 삭제해 주세요"); } }
function compressImage(file, cb){
  const r=new FileReader();
  r.onload=()=>{ const img=new Image(); img.onload=()=>{
    const max=720; let w=img.width,h=img.height;
    if(w>=h&&w>max){h=Math.round(h*max/w);w=max;} else if(h>w&&h>max){w=Math.round(w*max/h);h=max;}
    const c=document.createElement("canvas"); c.width=w; c.height=h;
    c.getContext("2d").drawImage(img,0,0,w,h);
    cb(c.toDataURL("image/jpeg",0.6));
  }; img.src=r.result; };
  r.readAsDataURL(file);
}

// ─── 상태 ───
let state = { step:0, mode:"quick", info:{initials:"",age:"",gender:"",address:"",living:"독거",house:"단독주택",dis:[]}, ans:{}, wel:{}, photos:{}, notes:{}, memo:"", prev:null, sign:null, viewIdx:-1, savedThis:false };

function activeDomains(){ return DOMAINS.map(d=>({...d, items: state.mode==="quick" ? d.items.filter(i=>i.core) : d.items})).filter(d=>d.items.length); }
function totalItems(){ return activeDomains().reduce((a,d)=>a+d.items.length,0); }
function totalWelfare(){ return state.mode==="full" ? WELFARE.reduce((a,g)=>a+g.items.length,0) : 0; }
function score100(){ const n=Object.keys(state.ans).length; if(!n) return 0; const raw=Object.values(state.ans).reduce((a,b)=>a+b,0); return Math.round(raw/(totalItems()*2)*100); }
function urgentList(){ const l=[]; activeDomains().forEach(d=>d.items.forEach((it,i)=>{ if(state.ans[d.id+"-"+i]===0) l.push({key:d.id+"-"+i,domain:d.name,item:it.t,critical:!!d.critical}); })); return l; }
function cautionList(){ const l=[]; activeDomains().forEach(d=>d.items.forEach((it,i)=>{ if(state.ans[d.id+"-"+i]===1) l.push({domain:d.name,item:it.t}); })); return l; }
function welfareFlags(){ const l=[]; WELFARE.forEach(g=>g.items.forEach((it,i)=>{ if(state.wel[g.id+"-"+i]===true) l.push({group:g.name,item:it}); })); return l; }
function gradeOf(s,u){
  const crit=u.some(x=>x.critical); let g;
  if(s>=90) g={name:"안심",color:"#2E7D5B",desc:"현재 주거환경이 안전하게 관리되고 있습니다."};
  else if(s>=70) g={name:"관심",color:"#5B7DA8",desc:"일부 항목의 개선을 권고합니다. 정기 재점검 대상입니다."};
  else if(s>=50) g={name:"주의",color:"#C77D1F",desc:"위험요소가 다수 발견되었습니다. 우선순위 개선이 필요합니다."};
  else g={name:"위험",color:"#B3362E",desc:"즉각적인 개선 조치와 집중관리가 필요한 가구입니다."};
  if((u.length>=3||crit)&&g.name!=="위험") g={name:"위험",color:"#B3362E",desc:crit?"가스·소방 분야에서 '즉시조치' 항목이 발견되어 '위험' 등급으로 상향되었습니다.":"'즉시조치' 항목 3건 이상 발견으로 '위험' 등급으로 상향되었습니다."};
  else if(u.length>0&&(g.name==="안심"||g.name==="관심")) g={name:"주의",color:"#C77D1F",desc:"총점과 무관하게 '즉시조치' 항목이 발견되어 등급이 상향 조정되었습니다."};
  return g;
}
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;"); }
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1800); }
function disLabel(dis){ return dis&&dis.length ? "장애: "+dis.join(", ") : "장애 없음"; }

// ─── 스냅샷 (저장용) ───
function makeSnapshot(){
  const doms = activeDomains().map(d=>{
    const vals=d.items.map((_,i)=>state.ans[d.id+"-"+i]).filter(v=>v!==undefined);
    return { name:d.name, icon:d.icon, got:vals.reduce((a,b)=>a+b,0), max:d.items.length*2 };
  });
  const s=score100(), u=urgentList();
  return {
    ts: new Date().toISOString(), mode: state.mode,
    info: JSON.parse(JSON.stringify(state.info)),
    score: s, grade: gradeOf(s,u),
    domains: doms, urgent: u, caution: cautionList(),
    welfare: state.mode==="full" ? welfareFlags() : null,
    photos: JSON.parse(JSON.stringify(state.photos)),
    notes: JSON.parse(JSON.stringify(state.notes)),
    memo: state.memo,
    prev: state.prev ? JSON.parse(JSON.stringify(state.prev)) : null,
    sign: state.sign
  };
}
function summaryText(r){
  const d=new Date(r.ts);
  let t = "[홈세이프 스코어 진단 결과]\n";
  t += "진단일: "+d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")+"\n";
  t += "대상자: "+(r.info.initials||"미입력")+" / "+(r.info.gender||"성별 미입력")+" / "+(r.info.age?r.info.age+"세":"연령 미입력")+"\n";
  t += "주소: "+(r.info.address||"미입력")+"\n";
  t += "거주: "+r.info.living+" · "+r.info.house+" · "+disLabel(r.info.dis)+"\n";
  t += "모드: "+(r.mode==="quick"?"간편(20문항)":"정밀(62문항)")+"\n";
  t += "─────────────\n";
  t += "통합 안전점수: "+r.score+"/100 ("+r.grade.name+" 등급)\n";
  if(r.prev){ const df=r.score-r.prev.score; t += "지난 진단("+r.prev.dateStr+") "+r.prev.score+"점 → "+(df>0?"개선 +"+df:"악화 "+df)+(df===0?"변동 없음":"")+"점\n"; }
  r.domains.forEach(x=>{ t += "· "+x.name+": "+x.got+"/"+x.max+"점\n"; });
  if(r.urgent.length){ t += "─ 즉시조치 "+r.urgent.length+"건\n"; r.urgent.forEach(x=>{ t+="  ["+x.domain+"] "+x.item+"\n"; const nt=(r.notes||{})[x.key]; if(nt) t+="    └ 조치: "+nt+"\n"; const ph=(r.photos||{})[x.key]||{}; if(ph.before||ph.after) t+="    └ 전·후 사진 촬영 완료\n"; }); }
  if(r.caution.length){ t += "─ 개선권고 "+r.caution.length+"건\n"; r.caution.forEach(x=>t+="  ["+x.domain+"] "+x.item+"\n"); }
  if(r.welfare&&r.welfare.length){ t += "─ 복지 연계 관찰 "+r.welfare.length+"건\n"; r.welfare.forEach(x=>t+="  ["+x.group+"] "+x.item+"\n"); }
  if(r.memo){ t += "─ 진단자 종합 의견\n  "+r.memo.replace(/\n/g,"\n  ")+"\n"; }
  t += "─ 대상자 확인 서명: "+(r.sign?"완료":"미서명")+"\n";
  return t;
}
function copyText(txt){
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(()=>toast("복사되었습니다. 카톡 등에 붙여넣으세요.")).catch(()=>fallbackCopy(txt)); }
  else fallbackCopy(txt);
}
function fallbackCopy(txt){ const ta=document.createElement("textarea"); ta.value=txt; document.body.appendChild(ta); ta.select(); try{document.execCommand("copy"); toast("복사되었습니다.");}catch(e){toast("복사 실패 - 길게 눌러 직접 복사해주세요");} document.body.removeChild(ta); }

// ─── 엑셀(CSV) 내보내기 ───
const CSV_DOMAINS = ["전기 안전","가스 안전","소방 안전","기계설비·보일러","낙상 예방","주거환경·위생"];
function csvCell(v){ v=(v===undefined||v===null)?"":String(v); return '"'+v.replace(/"/g,'""')+'"'; }
function exportCSV(){
  const recs=loadRecords();
  if(!recs.length){ toast("내보낼 기록이 없습니다"); return; }
  const head=["진단일","진단모드","이니셜","성별","연령","주소","거주형태","주거형태","장애유형",
    "통합점수(100)","등급",
    ...CSV_DOMAINS.map(d=>d+" 점수"),
    "즉시조치 건수","즉시조치 내역","조치 메모","전후사진 촬영 건수",
    "개선권고 건수","개선권고 내역","복지관찰 건수","복지관찰 내역","진단자 종합의견","대상자 확인서명"];
  const rows=recs.map(r=>{
    const d=new Date(r.ts);
    const dateStr=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    const domScore=CSV_DOMAINS.map(name=>{ const x=(r.domains||[]).find(v=>v.name===name); return x? x.got+"/"+x.max : ""; });
    const urgentTxt=(r.urgent||[]).map(x=>"["+x.domain+"] "+x.item).join(" / ");
    const noteTxt=(r.urgent||[]).map(x=>(r.notes||{})[x.key]).filter(Boolean).join(" / ");
    let photoCnt=0; (r.urgent||[]).forEach(x=>{ const p=(r.photos||{})[x.key]||{}; if(p.before)photoCnt++; if(p.after)photoCnt++; });
    const cautionTxt=(r.caution||[]).map(x=>"["+x.domain+"] "+x.item).join(" / ");
    const wf=r.welfare||[];
    return [dateStr, r.mode==="quick"?"간편(20)":"정밀(62)",
      r.info.initials, r.info.gender, r.info.age, r.info.address, r.info.living, r.info.house,
      (r.info.dis&&r.info.dis.length)?r.info.dis.join("·"):"없음",
      r.score, r.grade.name,
      ...domScore,
      (r.urgent||[]).length, urgentTxt, noteTxt, photoCnt,
      (r.caution||[]).length, cautionTxt,
      wf.length, wf.map(x=>"["+x.group+"] "+x.item).join(" / "),
      r.memo||"", r.sign?"완료":"미서명"].map(csvCell).join(",");
  });
  const csv="\uFEFF"+head.map(csvCell).join(",")+"\n"+rows.join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a");
  const dd=new Date();
  a.href=URL.createObjectURL(blob);
  a.download="홈세이프_진단기록_"+dd.getFullYear()+String(dd.getMonth()+1).padStart(2,"0")+String(dd.getDate()).padStart(2,"0")+".csv";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(a.href),3000);
  toast("엑셀 파일이 다운로드되었습니다");
}

// ─── 렌더 ───
function render(){
  renderSteps();
  const app=document.getElementById("app");
  if(state.step===0) app.innerHTML=viewStep0();
  else if(state.step===1) app.innerHTML=viewStep1();
  else if(state.step===2) app.innerHTML=viewResult(makeSnapshot(), true);
  else if(state.step===3) app.innerHTML=viewRecords();
  else if(state.step===4){ const r=loadRecords()[state.viewIdx]; app.innerHTML = r ? viewResult(r,false) : viewRecords(); }
  renderGauge(); bindEvents();
  document.body.style.paddingBottom = state.step===1 ? "116px" : "40px";
}

  const labels = state.step>=3 ? ["기록","",""] : ["기본 정보","안전 진단","결과 리포트"];

function hintsFor(domId){
  const out=[];
  state.info.dis.forEach(d=>{ if(DIS_HINTS[d]&&DIS_HINTS[d][domId]) out.push({type:d, txt:DIS_HINTS[d][domId]}); });
  return out;
}

  let html = state.mode==="quick"
    ? `<div class="modetag" style="background:#E7EDF5;color:#3D5A80">간편 진단 모드 · 핵심 20문항</div>`
    : `<div class="modetag" style="background:#F5EDDA;color:#8A6A1E">정밀 진단 모드 · 안전 50문항 + 복지관찰 12문항</div>`;

function renderGauge(){

  const tot=totalItems()+totalWelfare();
  g.innerHTML=`<div class="gauge"><div class="inner">
    <div class="top"><span class="lab">실시간 안전점수 · ${a}/${totalItems()}${state.mode==="full"?" · 복지관찰 "+w+"/"+totalWelfare():""}</span>
    <span class="sc ${u.length?"warn":""}">${score100()}<small>/100</small></span></div>
    <div class="track"><div class="fill" style="width:${(a+w)/tot*100}%"></div></div>
    ${u.length?`<div class="alert">⚠ 즉시조치 ${u.length}건 발견 — 등급 상향 규칙 적용됨</div>`:""}
  </div></div>`;
}
function bindEvents(){
  document.querySelectorAll("[data-mode]").forEach(el=>el.onclick=()=>{ if(state.mode!==el.dataset.mode){ state.mode=el.dataset.mode; state.ans={}; state.wel={}; state.photos={}; state.notes={}; state.memo=""; state.sign=null; } render(); });
  document.querySelectorAll("[data-group]").forEach(grp=>{
    grp.querySelectorAll("button").forEach(b=>b.onclick=()=>{ state.info[grp.dataset.group]=b.dataset.v; render(); });
  });
  document.querySelectorAll("[data-dis]").forEach(b=>b.onclick=()=>{
    const v=b.dataset.dis, arr=state.info.dis;
    const idx=arr.indexOf(v); if(idx>=0) arr.splice(idx,1); else arr.push(v);
    render();
  });
  const fi=document.getElementById("f-init"); if(fi) fi.oninput=e=>state.info.initials=e.target.value;
  const fa=document.getElementById("f-age"); if(fa) fa.oninput=e=>state.info.age=e.target.value;
  const fd=document.getElementById("f-addr"); if(fd) fd.oninput=e=>state.info.address=e.target.value;
  const st=document.getElementById("start"); if(st) st.onclick=()=>{ state.step=1; state.savedThis=false; render(); window.scrollTo(0,0); };
  document.querySelectorAll("[data-ans]").forEach(b=>b.onclick=()=>{ state.ans[b.dataset.ans]=parseInt(b.dataset.s); render(); });
  document.querySelectorAll("[data-photo]").forEach(inp=>inp.onchange=e=>{
    const [key,slot]=inp.dataset.photo.split("|"); const f=e.target.files[0]; if(!f) return;
    compressImage(f, url=>{ if(!state.photos[key]) state.photos[key]={}; state.photos[key][slot]=url; render(); toast("사진이 첨부되었습니다"); });
  });
  document.querySelectorAll("[data-pdel]").forEach(b=>b.onclick=()=>{ const [key,slot]=b.dataset.pdel.split("|"); if(state.photos[key]) delete state.photos[key][slot]; render(); });
  document.querySelectorAll("[data-note]").forEach(inp=>inp.oninput=()=>{ state.notes[inp.dataset.note]=inp.value; });
  const mm=document.getElementById("memo"); if(mm) mm.oninput=()=>state.memo=mm.value;
  document.querySelectorAll("[data-wel]").forEach(b=>b.onclick=()=>{ state.wel[b.dataset.wel]=b.dataset.v==="1"; render(); });
  const fin=document.getElementById("finish"); if(fin) fin.onclick=()=>{ state.step=2; render(); window.scrollTo(0,0); };
  const sv=document.getElementById("saverec"); if(sv) sv.onclick=()=>{
    const pad=document.getElementById("signpad");
    if(pad&&pad.dataset.stroked==="1") state.sign=pad.toDataURL("image/png");
    const recs=loadRecords(); recs.unshift(makeSnapshot()); saveRecords(recs);
    state.savedThis=true; toast("저장되었습니다 ("+recs.length+"건)"); render();
  };
  // 서명 패드 초기화
  const pad=document.getElementById("signpad");
  if(pad){
    const rect=pad.getBoundingClientRect();
    pad.width=rect.width*2; pad.height=300; // 고해상도
    const ctx=pad.getContext("2d");
    ctx.scale(2,2); ctx.lineWidth=2.5; ctx.lineCap="round"; ctx.lineJoin="round"; ctx.strokeStyle="#16294B";
    if(state.sign){ const im=new Image(); im.onload=()=>ctx.drawImage(im,0,0,rect.width,150); im.src=state.sign; pad.dataset.stroked="1"; }
    let drawing=false;
    const pos=e=>{ const r=pad.getBoundingClientRect(); return {x:e.clientX-r.left, y:e.clientY-r.top}; };
    pad.onpointerdown=e=>{ e.preventDefault(); pad.setPointerCapture(e.pointerId); drawing=true; const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x+0.1,p.y+0.1); ctx.stroke(); pad.dataset.stroked="1"; const h=document.getElementById("signhint"); if(h) h.remove(); };
    pad.onpointermove=e=>{ if(!drawing) return; e.preventDefault(); const p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); };
    pad.onpointerup=pad.onpointercancel=()=>{ drawing=false; };
    const sc=document.getElementById("signclear");
    if(sc) sc.onclick=()=>{ ctx.clearRect(0,0,rect.width,150); pad.dataset.stroked="0"; state.sign=null; render(); };
  }
  const cp=document.getElementById("copyrec"); if(cp) cp.onclick=()=>{
    const r = state.step===2 ? makeSnapshot() : loadRecords()[state.viewIdx];
    if(r) copyText(summaryText(r));
  };
  const nd=document.getElementById("newdiag"); if(nd) nd.onclick=()=>{
    state={step:0,mode:state.mode,info:{initials:"",age:"",gender:"",address:"",living:"독거",house:"단독주택",dis:[]},ans:{},wel:{},photos:{},notes:{},memo:"",prev:null,sign:null,viewIdx:-1,savedThis:false};
    render(); window.scrollTo(0,0);
  };
  const or=document.getElementById("openrecs"); if(or) or.onclick=()=>{ state.step=3; render(); window.scrollTo(0,0); };
  const gh=document.getElementById("gohome"); if(gh) gh.onclick=()=>{ state.step=0; render(); window.scrollTo(0,0); };
  const br=document.getElementById("backrecs"); if(br) br.onclick=()=>{ state.step=3; render(); window.scrollTo(0,0); };
  document.querySelectorAll("[data-view]").forEach(el=>el.onclick=()=>{ state.viewIdx=parseInt(el.dataset.view); state.step=4; render(); window.scrollTo(0,0); });
  document.querySelectorAll("[data-recheck]").forEach(b=>b.onclick=()=>{
    const r=loadRecords()[parseInt(b.dataset.recheck)]; if(!r) return;
    const d=new Date(r.ts);
    state.info=JSON.parse(JSON.stringify(r.info));
    state.prev={ name:r.info.initials, score:r.score, gradeName:r.grade.name, dateStr:d.getFullYear()+"."+String(d.getMonth()+1).padStart(2,"0")+"."+String(d.getDate()).padStart(2,"0") };
    state.mode=r.mode; state.ans={}; state.wel={}; state.photos={}; state.notes={}; state.memo=""; state.sign=null; state.savedThis=false;
    state.step=0; render(); window.scrollTo(0,0); toast("이전 정보를 불러왔습니다. 진단을 시작하세요.");
  });
  const cxp=document.getElementById("cancelprev"); if(cxp) cxp.onclick=()=>{ state.prev=null; render(); };
  document.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{
    if(confirm("이 기록을 삭제할까요? 되돌릴 수 없습니다.")){
      const recs=loadRecords(); recs.splice(parseInt(b.dataset.del),1); saveRecords(recs); render();
    }
  });
  const ec=document.getElementById("exportcsv"); if(ec) ec.onclick=exportCSV;
  const ca=document.getElementById("copyall"); if(ca) ca.onclick=()=>{
    const recs=loadRecords();
    copyText(recs.map(summaryText).join("\n=============\n\n"));
  };
}
render();
</script>
</body>
</html>
